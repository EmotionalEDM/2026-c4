<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <!-- 标题由后端文案填充（app.js: applyStaticText） -->
  <title id="doc-title">SkillCODER</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- 顶部导航（文字内容来自后端 /api/ui/text） -->
<header class="nav">
  <div class="nav-brand" id="nav-home" role="link" tabindex="0" title="回到首页">
    <span class="logo" aria-hidden="true">
      <!-- 印章式盾形标志：水印「嵌入 → 验证」的视觉隐喻 -->
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none">
        <path d="M12 2.6 4.6 5.4v6.1c0 4.6 3.1 8 7.4 9.9 4.3-1.9 7.4-5.3 7.4-9.9V5.4L12 2.6Z"
              stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
        <path d="M8.4 12.1l2.4 2.5 4.8-5.2" stroke="currentColor" stroke-width="1.7"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </span>
    <div>
      <div class="brand-title" id="brand-title"></div>
      <div class="brand-sub" id="brand-sub"></div>
    </div>
  </div>
  <nav class="nav-links" id="nav-links"></nav>
</header>

<!-- 后端未连接时的提示 -->
<div id="offline" class="offline hidden">
  <div class="offline-card">
    <h2 id="offline-title"></h2>
    <p id="offline-desc"></p>
    <pre>cd backend
pip install -r requirements.txt
bash run.sh   # 监听 http://127.0.0.1:8000</pre>
    <p class="muted"><span id="offline-url-label"></span><code id="offline-url"></code></p>
    <button id="offline-btn" onclick="location.reload()"></button>
  </div>
</div>

<main id="page" class="hidden">

  <!-- ===== 首页视图：背景介绍与价值主张 ===== -->
  <div class="view" id="view-home">
  <!-- ① 知识背景 -->
  <section id="sec-intro" class="section hero">
    <div class="hero-inner">
      <h1 id="hero-h1"></h1>
      <p class="lead" id="hero-lead"></p>
      <div class="hero-grid" id="hero-grid"></div>
      <div class="hero-flow" id="hero-flow"></div>
      <a class="cta" id="hero-cta" href="#demo"></a>
    </div>
  </section>
  </div><!-- /view-home -->

  <!-- ===== 演示视图：案例选择 → 故事流 → 裁决（一条交互链，放同一页） ===== -->
  <div class="view" id="view-demo">
  <!-- ② Case 选择台 -->
  <section id="sec-cases" class="section">
    <div class="sec-head">
      <h2 id="cases-h2"></h2>
      <p class="sec-desc" id="cases-desc"></p>
    </div>
    <div class="attack-legend" id="attack-legend"></div>
    <div id="cases" class="cases-grid"></div>
  </section>

  <!-- ③ 故事流时间线 -->
  <section id="sec-story" class="section">
    <div class="sec-head">
      <h2 id="story-h2"></h2>
      <p id="story-sub" class="sec-desc"></p>
    </div>

    <div id="story" class="story hidden">
      <!-- 阶段进度条 -->
      <div class="stepper" id="stepper"></div>

      <!-- 当前步骤主体 -->
      <div class="step-stage" id="step-stage">
        <div class="step-head">
          <span class="step-no" id="step-no">1</span>
          <div>
            <div class="step-title" id="step-title">—</div>
            <div class="step-phase" id="step-phase"></div>
          </div>
          <!-- 进入剧场（聚焦）模式 -->
          <button id="btn-zoom" class="btn-zoom"></button>
        </div>
        <p class="step-story" id="step-story"></p>

        <!-- 各步的可视化区域（按 visual.type 渲染） -->
        <div class="step-visual" id="step-visual"></div>

        <!-- 技术细节折叠 -->
        <details class="tech">
          <summary id="tech-summary"></summary>
          <p id="step-tech"></p>
        </details>
      </div>

      <!-- 控制条 -->
      <div class="controls">
        <button id="btn-prev"></button>
        <div class="dots" id="dots"></div>
        <button id="btn-next"></button>
        <button id="btn-play" class="btn-play"></button>
      </div>
    </div>
  </section>

  <!-- ④ 结果裁决 -->
  <section id="sec-verdict" class="section">
    <div class="sec-head"><h2 id="verdict-h2"></h2></div>
    <div id="verdict" class="verdict hidden"></div>
    <p id="verdict-empty" class="sec-desc"></p>
  </section>
  </div><!-- /view-demo -->

  <!-- ===== 指标视图 ===== -->
  <div class="view" id="view-metrics">
  <!-- ⑤ 指标总览 -->
  <section id="sec-metrics" class="section">
    <div class="sec-head">
      <h2 id="metrics-h2"></h2>
      <p class="sec-desc" id="metrics-desc"></p>
    </div>
    <div id="metrics" class="metrics"></div>
  </section>
  </div><!-- /view-metrics -->

  <footer class="foot">
    <span id="foot-text"></span>
    <span id="foot-prov"></span>
  </footer>
</main>

<!-- 剧场（聚焦）模式：进入时 #step-stage 被移入 #theater-body，退出时移回原位 -->
<div id="theater" class="theater hidden" role="dialog" aria-modal="true">
  <div class="theater-progress"><i id="theater-progress"></i></div>
  <div class="theater-bar">
    <span class="theater-counter" id="theater-counter"></span>
    <span class="theater-hint" id="theater-hint"></span>
    <div class="theater-actions">
      <button id="theater-play" class="theater-btn"></button>
      <button id="theater-close" class="theater-btn" aria-label="Close">✕</button>
    </div>
  </div>
  <button id="theater-prev" class="theater-arrow" aria-label="Previous">‹</button>
  <div class="theater-body" id="theater-body"></div>
  <button id="theater-next" class="theater-arrow theater-arrow-r" aria-label="Next">›</button>
</div>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
